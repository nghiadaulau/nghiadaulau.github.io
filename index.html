    <style>
        /* Add your styles here */
        body {
            text-align: center; /* Để canh giữa phần nội dung */
        }

        .logo img {
            width: 25%; /* Điều chỉnh kích thước logo theo nhu cầu của bạn */
            height: auto; /* Đảm bảo tỷ lệ khung hình bảo toàn */
        }

        .square-card {
            display: inline-block;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin: 10px;
            width: 100px; /* Điều chỉnh chiều rộng theo nhu cầu của bạn */
        }

        .square-card a {
            display: block;
            width: 100%;
            height: 100%;
        }

        .square-card img {
            width: 100%; /* Đảm bảo hình ảnh chiếm toàn bộ không gian bên trong thẻ */
            height: auto; /* Đảm bảo tỷ lệ khung hình bảo toàn */
        }
    </style>
</head>
<body>
<main>
    <div class="logo">
        <img src="FlexUp-White.png" alt="FlexUp">

    <div class="intro">Hello, I'm FlexUp!</div>
    <div class="tagline">Multi-Platform | Multi-Service | Chip Timing Service | Dedicated | Thoughtful</div>
